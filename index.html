<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【公式】特別キャンペーン受付窓口</title>
    
    <style>
        /* 1画面に収めるための設定 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* 全体の中央揃えとレイアウト */
        .wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            padding: 30px 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            text-align: center;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 20px;
            font-weight: bold;
            color: #222;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }

        p {
            font-size: 14px;
            color: #666;
            margin: 0 0 25px 0;
            line-height: 1.6;
        }

        /* LINE公式カラーのボタン */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background-color: #06C755;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 16px 0;
            border-radius: 12px;
            transition: opacity 0.2s;
            box-sizing: border-box;
        }

        .btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        /* 審査通過率を上げるための免責事項（極小文字） */
        .disclaimer {
            font-size: 10px;
            color: #aaa;
            margin-top: 20px;
            line-height: 1.4;
            text-align: left;
        }
        
        .footer-links {
            margin-top: 15px;
            font-size: 11px;
        }
        
        .footer-links a {
            color: #888;
            text-decoration: none;
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="card">
            <div class="icon">🎁</div>
            <h1>フォロワー様感謝<br>特別キャンペーン</h1>
            <p>
                いつも応援ありがとうございます。<br>
                公式LINEを追加して、<br>
                限定特典（ギフト）をお受け取りください。
            </p>

            <a href="https://lin.ee/52ZHQBq class="btn">
                公式LINEを追加して確認する
            </a>

            <div class="disclaimer">
                ※特典の詳細は公式LINE内のご案内をご確認ください。<br>
                ※本キャンペーンは予告なく終了する場合がございます。予めご了承ください。
            </div>
        </div>
        
        <div class="footer-links">
            <a href="#">運営者情報</a> | <a href="#">プライバシーポリシー</a>
        </div>
    </div>

</body>
</html>
