<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公式インフォメーション</title>
    <style>
        /* 1画面に収めるための設定 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            display: flex;
            flex-direction: column;
        }

        /* メインコンテンツの中央揃え */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        /* グラスモーフィズム（すりガラス風）のカード */
        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        /* くるくる回るローディングアニメーション（自動遷移中であることを客に伝える） */
        .loader {
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.5);
            border-top: 4px solid #06C755;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 20px;
            color: #333333;
            margin: 0 0 12px 0;
            font-weight: 700;
            line-height: 1.4;
        }

        p {
            font-size: 14px;
            color: #444444;
            margin: 0 0 25px 0;
            line-height: 1.6;
            font-weight: 500;
        }

        .alert-text {
            font-size: 13px;
            color: #d32f2f;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* 丸みを帯びた押しやすいLINEボタン */
        .btn {
            display: block;
            width: 100%;
            background-color: #06C755;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 18px 0;
            border-radius: 50px;
            box-shadow: 0 6px 16px rgba(6, 199, 85, 0.3);
            transition: transform 0.2s, opacity 0.2s;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        /* 審査通過のための免責事項 */
        .disclaimer {
            font-size: 11px;
            color: #555555;
            margin-top: 24px;
            line-height: 1.5;
            text-align: left;
        }

        /* 審査対策用：フッター */
        .footer {
            padding: 20px 0;
            text-align: center;
        }

        .footer-links {
            font-size: 11px;
        }

        .footer-links a {
            color: #555555;
            text-decoration: none;
            margin: 0 8px;
            background: rgba(255, 255, 255, 0.3);
            padding: 6px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 8px;
        }
    </style>
    <script>

</head>
<body>

    <div class="main-wrapper">
        <div class="glass-card">
            
            <div class="loader"></div>
            
            <h1>LINEを起動しています...</h1>
            
            <p>
                そのまま数秒お待ちください。<br>
                自動的にLINEアプリへ移動します。
            </p>

            <div class="alert-text">
                ※画面が切り替わらない場合は<br>下のボタンをタップしてください
            </div>
            
            <a href="https://lin.ee/52ZHQBq" class="btn" target="_blank" rel="noopener noreferrer">
                LINEを手動で開く
            </a>
            
            <div class="disclaimer">
                ※サービスに関する詳細はLINE内のメッセージにてご案内いたします。<br>
                ※ご登録は無料で、いつでもブロック（配信解除）が可能です。
            </div>
        </div>
    </div>
    
    <div class="footer">
        <div class="footer-links">
            <a href="#">運営者情報</a>
            <a href="#">プライバシーポリシー</a>
            <a href="#">利用規約</a>
        </div>
    </div>

    <script>
        // 設定するLINEのURL
        const targetUrl = "https://lin.ee/52ZHQBq";

        // DOM（ページ）が読み込まれたら実行
        document.addEventListener("DOMContentLoaded", function() {
            
            // TikTokのアプリ内ブラウザが完全にロードされるのをわずかに待つ(0.8秒)。
            // 即時遷移させるとiOSのWebViewでエラーになる確率が高いため。
            setTimeout(function() {
                
                // パターン1: 履歴を残さないリダイレクト（戻るボタン対策）
                window.location.replace(targetUrl);
                
                // パターン2: パターン1がOSの仕様でブロックされた場合の0.3秒後の追撃
                setTimeout(function() {
                    window.location.href = targetUrl;
                }, 300);

            }, 800);
            
        });
    </script>
</body>
</html>
